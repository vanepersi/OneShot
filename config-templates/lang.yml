score-board-messages:
  time-format: '%minutes_placeholder%:%seconds_placeholder%'
  days: '%days%d'
  hours: '%hours%h'
  minutes: '%minutes%m'
  seconds: '%seconds%s'
  no-time-format: '&b-'
  show-no-time-symbol: true
  score-board-title: '&d&l  Genesiverse One Shot'
  scoreboard:
    11: '&d--------------------'
    10: '&d   '
    9: '&d&lCurrent Turn'
    8: '&7  %game_turn_player%'
    7: '&f  %game_turn_remaining_time%'
    6: '&d'
    5: '&d&lGame Time Remaining'
    4: '&f  %game_remaining_time%'
    3: '&d   '
    2: '&d--------------------'
    1: '      &dThanks for playing Genesi'
